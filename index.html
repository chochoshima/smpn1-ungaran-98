<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SPENSA 98 | Galeri Reuni</title>

    <meta name="description" content="Galeri Reuni Alumni SMP Negeri 1 Ungaran Angkatan 1998">
    <meta name="theme-color" content="#0B3D91">

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="SPENSA 98">

    <!-- Icon -->
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Open Graph -->
    <meta property="og:title" content="SPENSA 98 | Galeri Reuni">
    <meta property="og:description" content="Galeri Reuni Alumni SMP Negeri 1 Ungaran Angkatan 1998">
    <meta property="og:type" content="website">
    <meta property="og:image" content="icon-512.png">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

    <div class="brand">

        <img src="logo.png" class="logo" alt="SPENSA 98">

        <div class="brand-text">
            <h1>SPENSA 98</h1>
            <p>Galeri Reuni Alumni SMP Negeri 1 Ungaran Angkatan 1998</p>
        </div>

    </div>

    <div class="photo-count">
        <span id="photoCount">0</span>
        <small>Foto</small>
    </div>

</header>


<!-- Loading -->

<div class="loading" id="loading">

    <div class="spinner"></div>

    <p>Memuat galeri...</p>

</div>


<!-- Empty -->

<div class="empty-state" id="emptyState">

    <div class="empty-icon">📷</div>

    <h2>Belum Ada Foto</h2>

    <p>Galeri masih kosong.</p>

</div>


<!-- Gallery -->

<main>

    <div class="gallery" id="gallery"></div>

</main>


<!-- Viewer -->

<div class="viewer" id="viewer">

    <button class="close-btn" id="closeViewer" aria-label="Tutup">
        ✕
    </button>

    <button class="nav prev" id="prevPhoto" aria-label="Foto Sebelumnya">
        ❮
    </button>

    <div class="viewer-content">

        <img id="viewerImage" src="" alt="">

        <div class="caption" id="caption"></div>

        <div class="viewer-actions">

            <button id="downloadBtn">
                ⬇ Download
            </button>

            <button id="shareBtn">
                🔗 Bagikan
            </button>

        </div>

    </div>

    <button class="nav next" id="nextPhoto" aria-label="Foto Berikutnya">
        ❯
    </button>

</div>


<!-- Scroll Top -->

<button id="topButton" class="top-button" aria-label="Kembali ke atas">

    ↑

</button>


<!-- Footer -->

<footer>

    <div class="footer-inner">

        <p><strong>SPENSA 98</strong></p>

        <p>Alumni SMP Negeri 1 Ungaran Angkatan 1998</p>

        <p>&copy; 2026</p>

    </div>

</footer>


<!-- Template -->

<template id="photoTemplate">

    <div class="photo-card">

        <img loading="lazy" draggable="false">

    </div>

</template>


<!-- Script -->

<script src="app.js"></script>

<script>

if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker.register("sw.js")

        .then(() => {

            console.log("Service Worker berhasil didaftarkan.");

        })

        .catch(err => {

            console.error("Service Worker gagal:", err);

        });

    });

}

</script>

</body>

</html>
